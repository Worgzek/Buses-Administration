<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Xe Bus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3>BUS ADMIN</h3>
        </div>
        <ul class="list-unstyled components">
            <li id="menu-benxe" class="active" onclick="showSection('benxe')">
                <i class="fas fa-bus me-2"></i> Quản lý Bến xe
            </li>
            <li id="menu-tuyenxe" onclick="showSection('tuyenxe')">
                <i class="fas fa-route me-2"></i> Tuyến xe
            </li>
            <li onclick="alert('Tính năng đang phát triển!')">
                <i class="fas fa-users me-2"></i> Xe Bus
            </li>
            <li onclick="alert('Tính năng đang phát triển!')">
                <i class="fas fa-users me-2"></i> Nhân viên
            </li>
        </ul>
    </nav>

    <div id="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold" id="main-title">Quản lý Bến xe</h2>
                <div class="user-profile">
                    <span class="me-2 fw-semibold">Admin</span>
                    <i class="fas fa-user-circle fa-lg"></i>
                </div>
            </div>

            <div id="section-benxe" class="content-section">
                <div class="table-container mb-4 shadow-sm p-4 bg-white rounded">
                    <h5 class="card-title mb-4"><i class="fas fa-plus-circle me-2"></i>Thêm Bến Xe Mới</h5>
                    <form class="row g-3" id="form-benxe">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Mã bến</label>
                            <input type="text" class="form-control" id="bx-ma" placeholder="BX01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Tên bến xe</label>
                            <input type="text" class="form-control" id="bx-ten" placeholder="Bến xe Miền Đông">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Địa chỉ</label>
                            <input type="text" class="form-control" id="bx-diachi" placeholder="Quận/Huyện, Tỉnh">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-custom btn-primary w-100" onclick="handleAddStation()">Lưu</button>
                        </div>
                    </form>
                </div>

                <div class="table-container shadow-sm p-4 bg-white rounded">
                    <h5 class="fw-bold mb-3">Danh Sách Bến Xe</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Mã Bến</th>
                                    <th>Tên Bến Xe</th>
                                    <th>Địa Chỉ</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="section-tuyenxe" class="content-section" style="display: none;">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4"><i class="fas fa-plus-circle me-2"></i>Thêm Tuyến Xe Mới</h5>
                        <div class="row g-3">
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Mã Tuyến</label>
                                <input type="text" id="tx-ma" class="form-control" placeholder="01">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Điểm đầu</label>
                                <select id="tx-dau" class="form-select">
                                    <option value="">-- Chọn bến đi --</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold">Điểm cuối</label>
                                <select id="tx-cuoi" class="form-select">
                                    <option value="">-- Chọn bến đến --</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Giá vé</label>
                                <input type="number" id="tx-gia" class="form-control" placeholder="7000">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-primary w-100" onclick="handleAddTuyen()">Thêm</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-container shadow-sm p-4 bg-white rounded">
                    <h5 class="fw-bold mb-3">Danh Sách Tuyến Đường</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Mã Tuyến</th>
                                    <th>Lộ Trình</th>
                                    <th>Giá Vé</th>
                                    <th class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="table-body-tuyen"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">Sửa Bến xe: <span id="display-ma-bx"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="edit-ma">
                        <div class="mb-3"><label class="form-label">Tên bến xe mới</label><input type="text" class="form-control" id="edit-ten"></div>
                        <div class="mb-3"><label class="form-label">Địa chỉ mới</label><input type="text" class="form-control" id="edit-diachi"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="button" class="btn btn-success text-white" onclick="submitEdit()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="editTuyenModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Sửa Tuyến: <span id="display-ma-tx"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="edit-tx-ma">
                        <div class="mb-3"><label class="form-label">Bến đi</label><select id="edit-tx-dau" class="form-select"></select></div>
                        <div class="mb-3"><label class="form-label">Bến đến</label><select id="edit-tx-cuoi" class="form-select"></select></div>
                        <div class="mb-3"><label class="form-label">Giá vé</label><input type="number" id="edit-tx-gia" class="form-control"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="button" class="btn btn-primary" onclick="submitEditTuyen()">Lưu</button>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/benxe.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tuyenxe.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
