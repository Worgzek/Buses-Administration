<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Xe Bus - Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3>BUS ADMIN</h3>
            <small>Quốc Jack v1.0</small>
        </div>
        <ul class="list-unstyled components">
            <li class="active"><i class="fas fa-bus"></i> Quản lý Bến xe</li>
            <li><i class="fas fa-route"></i> Chuyến xe</li>
            <li><i class="fas fa-users"></i> Nhân viên</li>
            <li><i class="fas fa-ticket-alt"></i> Quản lý Vé</li>
            <li><i class="fas fa-file-invoice-dollar"></i> Thống kê Doanh thu</li>
        </ul>
    </nav>

    <div id="content">
        <div class="container-fluid">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Quản lý Bến xe</h2>
                <div class="user-profile">
                    <span class="me-2 fw-semibold">Quốc Jack</span>
                    <i class="fas fa-user-circle fa-lg"></i>
                </div>
            </div>

            <div class="table-container mb-4">
                <h5 class="fw-bold mb-3 text-primary"><i class="fas fa-plus-circle me-2"></i>Thêm Mới</h5>
                <form class="row g-3" id="main-form">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Mã bến</label>
                        <input type="text" class="form-control" placeholder="BX01">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Tên bến xe</label>
                        <input type="text" class="form-control" placeholder="Bến xe Miền Đông">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Địa chỉ</label>
                        <input type="text" class="form-control" placeholder="Quận/Huyện, Tỉnh">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-custom w-100">Lưu</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0">Danh Sách Dữ Liệu</h5>
                    <div class="search-box">
                        <input type="text" class="form-control form-control-sm" placeholder="Tìm kiếm nhanh...">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Mã Bến</th>
                                <th>Tên Bến Xe</th>
                                <th>Địa Chỉ</th>
                                <th>Trạng Thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
    <script src="{{ url_for('static', filename='js/benxe.js') }}"></script>
</body>
</html>
